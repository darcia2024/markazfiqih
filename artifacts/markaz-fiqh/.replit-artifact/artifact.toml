kind = "web"
previewPath = "/"
title = "Markaz Fiqh"
version = "1.0.0"
id = "artifacts/markaz-fiqh"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24864

[services.development]
run = "pnpm --filter @workspace/markaz-fiqh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/markaz-fiqh", "run", "build" ]
serve = "static"
publicDir = "artifacts/markaz-fiqh/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24864"
BASE_PATH = "/"
